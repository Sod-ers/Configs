# ==========    GENERAL    ==========
fullscreen=yes
taskbar-progress=no
force-seekable=no
hr-seek=no
keep-open=no
reset-on-next-file=pause
terminal=no
shuffle=yes
save-position-on-quit=no
ontop=yes
ontop-level=system
stop-screensaver=yes
keepaspect-window=no
window-minimized=no
window-maximized=yes
ab-loop-count=0
loop-playlist=inf
screenshot-directory="~/Pictures/Screenshots/mpv/"
screenshot-template="%F-%tF-%tH-%tM-%tS-%00n"
screenshot-high-bit-depth=yes
screenshot-format=png
screenshot-png-compression=1
geometry=1366x768+0+0
# framedrop=no

# ==========    OSD    ==========
osd-bar=no
osc=no
border=yes
cursor-autohide-fs-only=yes
cursor-autohide=1000
osd-level=1
osd-duration=1000
osd-font='SF-Pro'
osd-font-size=50
osd-color='#FFFFFF'
osd-border-color='#000000'
osd-border-size=1.0
osd-blur=0.0
osd-margin-y=325
osd-margin-x=0

# ==========    AUDIO    ==========
mute=yes
volume=0
volume-max=100.0
